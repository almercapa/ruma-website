<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to RUMA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-black text-white font-sans antialiased">
  <main class="mx-auto max-w-screen-xl px-6 py-32 text-center">
    <div class="inline-block border border-scarlet-700/30 bg-scarlet-700/5 px-4 py-1.5 mb-8 rounded-full">
      <span class="text-scarlet-700 text-[10px] font-bold uppercase tracking-[0.2em]">Application Received</span>
    </div>
    <h1 class="text-6xl font-bold uppercase italic mb-8 tracking-tightest">You're on the roster.</h1>
    
    <div class="max-w-2xl mx-auto space-y-12 text-left bg-gray-950 border border-white/5 p-10 rounded-sm">
      <div>
        <h3 class="text-scarlet-700 font-bold uppercase text-xs tracking-widest mb-2">Next Steps</h3>
        <p class="text-gray-400">Join our Discord to see the latest updates: <a href="#" class="text-white underline">Join Discord</a></p>
      </div>
      <div>
        <h3 class="text-scarlet-700 font-bold uppercase text-xs tracking-widest mb-2">First Practice</h3>
        <p class="text-gray-400">Show up to College Ave Gym (Wrestling Room) 10 minutes early. Wear standard athletic gear.</p>
      </div>
      <a href="/pages/index.html" class="block text-center py-4 border border-white/10 hover:bg-white hover:text-black transition-all uppercase font-bold text-[11px] tracking-widest">Back to Home</a>
    </div>
  </main>

</html>
